<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>每行下划线效果</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0A0F0E; font-family: -apple-system, "PingFang SC", sans-serif; color: #E8F0EC; display: flex; justify-content: center; align-items: center; min-height: 100vh; }

.phone {
  width: 390px; height: 844px;
  border-radius: 56px; border: 3px solid #1a1f1e;
  background: #0A0F0E; overflow: hidden;
  position: relative; display: flex; flex-direction: column;
}

.phone-header { padding: 60px 24px 12px; text-align: center; }
.book-title { font-size: 12px; color: #546E64; letter-spacing: 0.1em; }

.card-area { flex: 1; padding: 16px 24px; display: flex; align-items: center; justify-content: center; }

.card {
  width: 100%; border-radius: 20px;
  background: rgba(255,255,255,0.035);
  border: 1px solid rgba(52,211,153,0.10);
  box-shadow: 0 6px 24px rgba(0,0,0,0.3), 0 0 40px rgba(52,211,153,0.06);
  padding: 48px 28px; position: relative; cursor: pointer; overflow: hidden;
}

.card::before {
  content: ''; position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
  background: linear-gradient(135deg, #34D399, #F0A050); opacity: 0.4;
}

.sentence-wrap {
  position: relative;
}

.sentence {
  font-size: 17px;
  line-height: 37.4px; /* 17px * 2.2 */
  font-weight: 500;
  text-align: center;
  text-shadow: 0 0 28px rgba(52,211,153,0.15);
  position: relative;
  z-index: 2;
}

.line-bg {
  position: absolute;
  left: 0; right: 0; top: 0; bottom: 0;
  z-index: 1;
  background: repeating-linear-gradient(
    to bottom,
    transparent 0px,
    transparent 36.4px,
    rgba(52,211,153,0.3) 36.4px,
    rgba(52,211,153,0.3) 37.4px
  );
}

.author {
  text-align: center; margin-top: 24px;
  display: flex; align-items: center; justify-content: center; gap: 10px;
}
.author-line { width: 16px; height: 1px; background: #2E4A40; }
.author-name { font-size: 12px; color: #546E64; letter-spacing: 0.08em; }

.orb { position: absolute; border-radius: 50%; pointer-events: none; }
.orb-1 { width: 320px; height: 320px; background: rgba(52,211,153,0.055); top: -80px; left: -50px; }
.orb-2 { width: 280px; height: 280px; background: rgba(240,160,80,0.04); top: 35%; right: -70px; }

.home-indicator { width: 134px; height: 5px; background: #3a3f3e; border-radius: 3px; margin: 8px auto 12px; }

.card:active { transform: scale(0.985); transition: transform 0.15s ease; }
</style>
</head>
<body>

<div class="phone">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>
  <div class="phone-header">
    <div class="book-title">《人类简史》</div>
  </div>
  <div class="card-area">
    <div class="card">
      <div class="sentence-wrap">
        <div class="line-bg"></div>
        <div class="sentence">身为人类，我们不可能脱离想象所建构的秩序。每一次我们以为自己打破了监狱的高墙、迈向自由的前方，其实只是到了另一间更大的监狱。</div>
      </div>
      <div class="author">
        <div class="author-line"></div>
        <div class="author-name">尤瓦尔·赫拉利</div>
        <div class="author-line"></div>
      </div>
    </div>
  </div>
  <div class="home-indicator"></div>
</div>

</body>
</html>
