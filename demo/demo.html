<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>一句话阅读 Demo</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
  </style>
</head>
<body>
  <div id="root"></div>
  
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/framer-motion@11.0.3/dist/framer-motion.js"></script>
  
  <script>
    const { useState, useEffect, useMemo, useRef, createElement: h } = React;
    const { createRoot } = ReactDOM;
    const { motion, AnimatePresence } = Motion;

    // Lucide icons as inline SVG components
    const ChevronDown = ({ className }) => h('svg', { 
      xmlns: "http://www.w3.org/2000/svg", 
      width: 24, 
      height: 24, 
      viewBox: "0 0 24 24", 
      fill: "none", 
      stroke: "currentColor", 
      strokeWidth: 2, 
      strokeLinecap: "round", 
      strokeLinejoin: "round",
      className 
    }, h('polyline', { points: "6 9 12 15 18 9" }));

    const ChevronUp = ({ className }) => h('svg', { 
      xmlns: "http://www.w3.org/2000/svg", 
      width: 24, 
      height: 24, 
      viewBox: "0 0 24 24", 
      fill: "none", 
      stroke: "currentColor", 
      strokeWidth: 2, 
      strokeLinecap: "round", 
      strokeLinejoin: "round",
      className 
    }, h('polyline', { points: "18 15 12 9 6 15" }));

    const Sparkles = ({ className }) => h('svg', { 
      xmlns: "http://www.w3.org/2000/svg", 
      width: 24, 
      height: 24, 
      viewBox: "0 0 24 24", 
      fill: "none", 
      stroke: "currentColor", 
      strokeWidth: 2, 
      strokeLinecap: "round", 
      strokeLinejoin: "round",
      className 
    }, 
      h('path', { d: "M9.937 15.5A2 2 0 0 0 8.5 14.063l-6.135-1.582a.5.5 0 0 1 0-.962L8.5 9.936A2 2 0 0 0 9.937 8.5l1.582-6.135a.5.5 0 0 1 .963 0L14.063 8.5A2 2 0 0 0 15.5 9.937l6.135 1.582a.5.5 0 0 1 0 .963L15.5 14.063a2 2 0 0 0-1.437 1.437l-1.582 6.135a.5.5 0 0 1-.963 0z" }),
      h('path', { d: "M20 3v4" }),
      h('path', { d: "M22 5h-4" }),
      h('path', { d: "M4 17v2" }),
      h('path', { d: "M5 18H3" })
    );

    const BookOpen = ({ className }) => h('svg', { 
      xmlns: "http://www.w3.org/2000/svg", 
      width: 24, 
      height: 24, 
      viewBox: "0 0 24 24", 
      fill: "none", 
      stroke: "currentColor", 
      strokeWidth: 2, 
      strokeLinecap: "round", 
      strokeLinejoin: "round",
      className 
    }, 
      h('path', { d: "M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z" }),
      h('path', { d: "M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z" })
    );

    const Shuffle = ({ className }) => h('svg', { 
      xmlns: "http://www.w3.org/2000/svg", 
      width: 24, 
      height: 24, 
      viewBox: "0 0 24 24", 
      fill: "none", 
      stroke: "currentColor", 
      strokeWidth: 2, 
      strokeLinecap: "round", 
      strokeLinejoin: "round",
      className 
    }, 
      h('path', { d: "M2 18h1.4c1.3 0 2.5-.6 3.3-1.7l6.1-8.6c.7-1.1 2-1.7 3.3-1.7H22" }),
      h('path', { d: "m18 2 4 4-4 4" }),
      h('path', { d: "M2 6h1.9c1.5 0 2.9.9 3.6 2.2" }),
      h('path', { d: "M22 18h-5.9c-1.3 0-2.6-.7-3.3-1.8l-.5-.8" }),
      h('path', { d: "m18 14 4 4-4 4" })
    );

    const MOCK_BOOKS = [
      {
        id: "b1",
        title: "The Unnamed Book",
        author: "Anonymous",
        passages: [
          {
            id: "b1-p1",
            lines: [
              "I used to think a beginning had to be polite.",
              "But the mind begins where it trembles.",
              "A sentence can be a door you didn't know you needed.",
              "So I stopped looking for chapter one.",
              "I started looking for the line that looked back at me."
            ],
            focus: 2
          },
          {
            id: "b1-p2",
            lines: [
              "You don't lack discipline.",
              "You lack a place to return to yourself.",
              "Read slowly until your body agrees.",
              "The page is not a task list.",
              "It is a climate." 
            ],
            focus: 1
          },
          {
            id: "b1-p3",
            lines: [
              "If a book feels far, don't chase it.",
              "Let one line come close.",
              "Hold it like a warm coin.",
              "Walk around with it in your pocket.",
              "Then open the rest when you're ready." 
            ],
            focus: 2
          },
          {
            id: "b1-p4",
            lines: [
              "Sometimes the truth arrives as a small irritation.",
              "A sentence you can't swipe away.",
              "Not because it's correct.",
              "Because it's precise.",
              "Because it names what you didn't dare to name." 
            ],
            focus: 1
          }
        ]
      },
      {
        id: "b2",
        title: "Notes on Becoming",
        author: "K.M.",
        passages: [
          {
            id: "b2-p1",
            lines: [
              "There are days you are functional but not present.",
              "Your calendar is full, your self is missing.",
              "The remedy is not more effort.",
              "It's a quieter kind of honesty.",
              "One sentence at a time." 
            ],
            focus: 4
          },
          {
            id: "b2-p2",
            lines: [
              "A useful question is not: What should I do?",
              "But: What is asking to be felt?",
              "Language is a handle on the unsaid.",
              "When the handle appears, take it.",
              "That is how reading becomes life." 
            ],
            focus: 2
          },
          {
            id: "b2-p3",
            lines: [
              "Do not worship clarity.",
              "Clarity is sometimes a defence.",
              "Let the page remain slightly foggy.",
              "Move inside the fog with care.",
              "Meaning will condense when you're kind." 
            ],
            focus: 3
          }
        ]
      }
    ];

    function clamp(n, min, max) {
      return Math.max(min, Math.min(max, n));
    }

    function usePrefersReducedMotion() {
      const [reduced, setReduced] = useState(false);
      useEffect(() => {
        const mq = window.matchMedia?.("(prefers-reduced-motion: reduce)");
        if (!mq) return;
        const onChange = () => setReduced(!!mq.matches);
        onChange();
        mq.addEventListener?.("change", onChange);
        return () => mq.removeEventListener?.("change", onChange);
      }, []);
      return reduced;
    }

    function GlassButton({ icon: Icon, children, onClick, title }) {
      return h(
        "button",
        {
          onClick: onClick,
          title: title,
          className: "group inline-flex items-center gap-2 rounded-2xl border border-white/15 bg-white/10 px-3 py-2 text-sm text-white/90 shadow-[0_12px_40px_rgba(0,0,0,0.25)] backdrop-blur-xl transition hover:bg-white/15 active:scale-[0.99]"
        },
        Icon ? h(Icon, { className: "h-4 w-4 text-white/80 transition group-hover:text-white" }) : null,
        h("span", { className: "whitespace-nowrap" }, children)
      );
    }

    function ReadingCard({ passage, book, showMeta = true }) {
      const focus = passage.focus;
      const lines = passage.lines;

      return h(
        "div",
        { className: "relative mx-auto w-full max-w-[760px] px-6" },
        h("div", { className: "pointer-events-none absolute -inset-6 rounded-[32px] bg-gradient-to-b from-white/10 via-white/0 to-white/10 blur-2xl" }),
        h(
          "div",
          { className: "relative overflow-hidden rounded-[32px] border border-white/15 bg-white/8 p-6 shadow-[0_18px_70px_rgba(0,0,0,0.35)] backdrop-blur-xl" },
          showMeta ? h(
            "div",
            { className: "mb-5 flex items-center justify-between gap-3" },
            h(
              "div",
              { className: "min-w-0" },
              h(
                "div",
                { className: "flex items-center gap-2 text-white/70" },
                h(BookOpen, { className: "h-4 w-4" }),
                h("span", { className: "truncate text-sm" }, book.title)
              ),
              h("div", { className: "mt-1 truncate text-xs text-white/45" }, book.author)
            ),
            h(
              "div",
              { className: "flex items-center gap-2 rounded-2xl border border-white/10 bg-white/5 px-3 py-1.5 text-xs text-white/60" },
              h(Sparkles, { className: "h-3.5 w-3.5" }),
              h("span", null, "Start anywhere")
            )
          ) : null,
          h(
            "div",
            { className: "space-y-3" },
            lines.map((t, idx) => {
              const dist = Math.abs(idx - focus);
              const isFocus = idx === focus;
              const opacity = isFocus ? 1 : dist === 1 ? 0.55 : dist === 2 ? 0.25 : 0.14;

              return h(
                "div",
                {
                  key: idx,
                  className: "leading-relaxed tracking-[0.01em] " +
                    (isFocus
                      ? "text-[22px] sm:text-[26px] font-semibold text-white"
                      : "text-[15px] sm:text-[16px] font-medium text-white"),
                  style: { opacity }
                },
                isFocus ? h(
                  "span",
                  { className: "relative inline" },
                  h("span", { className: "absolute -inset-x-2 -inset-y-1 -z-10 rounded-2xl bg-white/10" }),
                  t
                ) : t
              );
            })
          ),
          h(
            "div",
            { className: "mt-7 flex items-center justify-between" },
            h("div", { className: "text-xs text-white/40" }, "Scroll ↓ to expand the context"),
            h("div", { className: "text-xs text-white/40" }, "Scroll ↑ to rewind")
          )
        )
      );
    }

    function BookPill({ active, title, onClick }) {
      return h(
        "button",
        {
          onClick: onClick,
          className: "rounded-full px-4 py-2 text-sm transition " +
            (active
              ? "bg-white/16 text-white border border-white/20"
              : "bg-white/6 text-white/70 border border-white/10 hover:bg-white/10")
        },
        h("span", { className: "truncate" }, title)
      );
    }

    function OneLineReaderDemo() {
      const prefersReducedMotion = usePrefersReducedMotion();
      const [bookId, setBookId] = useState(MOCK_BOOKS[0].id);
      const book = useMemo(() => MOCK_BOOKS.find((b) => b.id === bookId) || MOCK_BOOKS[0], [bookId]);
      const [index, setIndex] = useState(0);
      const [seed, setSeed] = useState(0);
      const maxIdx = book.passages.length - 1;

      useEffect(() => {
        setIndex(0);
        setSeed((s) => s + 1);
      }, [bookId]);

      const go = (delta) => {
        setIndex((i) => clamp(i + delta, 0, maxIdx));
      };

      const shuffleStart = () => {
        const next = Math.floor(Math.random() * (maxIdx + 1));
        setIndex(next);
        setSeed((s) => s + 1);
      };

      const wheelLock = useRef(false);
      const onWheel = (e) => {
        if (wheelLock.current) return;
        const dy = e.deltaY;
        if (Math.abs(dy) < 18) return;
        wheelLock.current = true;
        if (dy > 0) go(1);
        else go(-1);
        window.setTimeout(() => (wheelLock.current = false), 520);
      };

      useEffect(() => {
        const onKey = (e) => {
          if (e.key === "ArrowDown" || e.key === "j") go(1);
          if (e.key === "ArrowUp" || e.key === "k") go(-1);
          if (e.key === " ") {
            e.preventDefault();
            shuffleStart();
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      });

      const passage = book.passages[index];

      return h(
        "div",
        { className: "min-h-screen w-full bg-[#070912] text-white", onWheel: onWheel },
        h(
          "div",
          { className: "pointer-events-none fixed inset-0" },
          h("div", { className: "absolute -left-24 -top-24 h-[520px] w-[520px] rounded-full bg-white/10 blur-[90px]" }),
          h("div", { className: "absolute -right-20 top-24 h-[540px] w-[540px] rounded-full bg-white/8 blur-[110px]" }),
          h("div", { className: "absolute bottom-[-180px] left-1/2 h-[700px] w-[700px] -translate-x-1/2 rounded-full bg-white/6 blur-[140px]" }),
          h("div", { className: "absolute inset-0 bg-[radial-gradient(circle_at_20%_20%,rgba(255,255,255,0.08),transparent_45%),radial-gradient(circle_at_80%_30%,rgba(255,255,255,0.06),transparent_50%),radial-gradient(circle_at_50%_90%,rgba(255,255,255,0.05),transparent_55%)]" }),
          h("div", { className: "absolute inset-0 opacity-[0.05] [background-image:linear-gradient(to_right,rgba(255,255,255,0.2)_1px,transparent_1px),linear-gradient(to_bottom,rgba(255,255,255,0.2)_1px,transparent_1px)] [background-size:42px_42px]" })
        ),
        h(
          "div",
          { className: "relative mx-auto flex max-w-[980px] items-center justify-between px-6 pt-8" },
          h(
            "div",
            null,
            h("div", { className: "text-sm text-white/55" }, "一句话阅读 · Demo"),
            h("div", { className: "mt-1 text-lg font-semibold tracking-tight" }, "从任何一句话开始读一本书")
          ),
          h(
            "div",
            { className: "hidden items-center gap-2 sm:flex" },
            h(GlassButton, { icon: Shuffle, onClick: shuffleStart, title: "随机从一句话开始（Space）" }, "随机开始"),
            h(GlassButton, { icon: ChevronUp, onClick: () => go(-1), title: "上一段（↑ / k）" }, "上一段"),
            h(GlassButton, { icon: ChevronDown, onClick: () => go(1), title: "下一段（↓ / j）" }, "下一段")
          )
        ),
        h(
          "div",
          { className: "relative mx-auto mt-5 max-w-[980px] px-6" },
          h(
            "div",
            { className: "flex flex-wrap gap-2" },
            MOCK_BOOKS.map((b) =>
              h(BookPill, {
                key: b.id,
                title: b.title,
                active: b.id === bookId,
                onClick: () => setBookId(b.id)
              })
            )
          ),
          h("div", { className: "mt-2 text-xs text-white/40" }, "提示：滚轮上下刷 / ↑↓ 键 / j k；按 Space 随机从一句话开始。")
        ),
        h(
          "div",
          { className: "relative flex min-h-[calc(100vh-220px)] items-center justify-center px-2 py-10" },
          h(
            AnimatePresence,
            { mode: "wait" },
            h(
              motion.div,
              {
                key: `${book.id}-${passage.id}-${seed}`,
                initial: prefersReducedMotion ? { opacity: 0 } : { opacity: 0, y: 18, filter: "blur(6px)" },
                animate: prefersReducedMotion ? { opacity: 1 } : { opacity: 1, y: 0, filter: "blur(0px)" },
                exit: prefersReducedMotion ? { opacity: 0 } : { opacity: 0, y: -12, filter: "blur(6px)" },
                transition: { duration: prefersReducedMotion ? 0.12 : 0.42, ease: [0.2, 0.8, 0.2, 1] },
                className: "w-full"
              },
              h(ReadingCard, { passage: passage, book: book })
            )
          ),
          h(
            "div",
            { className: "fixed bottom-6 left-1/2 z-10 flex -translate-x-1/2 gap-2 sm:hidden" },
            h(GlassButton, { icon: ChevronUp, onClick: () => go(-1), title: "上一段" }, "上一段"),
            h(GlassButton, { icon: Shuffle, onClick: shuffleStart, title: "随机开始" }, "随机"),
            h(GlassButton, { icon: ChevronDown, onClick: () => go(1), title: "下一段" }, "下一段")
          )
        ),
        h(
          "div",
          { className: "relative mx-auto max-w-[980px] px-6 pb-10" },
          h(
            "div",
            { className: "flex items-center justify-between rounded-2xl border border-white/10 bg-white/5 px-4 py-3 text-xs text-white/55 backdrop-blur-xl" },
            h(
              "span",
              null,
              "当前位置：",
              h("span", { className: "text-white/80" }, index + 1),
              " / ",
              book.passages.length
            ),
            h("span", { className: "hidden sm:inline" }, "核心交互：一句话高亮 + 上下文半透明 + 纵向刷动"),
            h("span", { className: "sm:hidden" }, "上下刷动")
          )
        )
      );
    }

    const root = createRoot(document.getElementById('root'));
    root.render(h(OneLineReaderDemo));
  </script>
</body>
</html>
