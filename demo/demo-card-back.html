<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>卡片跳转交互 Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #060808;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: "Noto Sans SC", -apple-system, "SF Pro Rounded", "PingFang SC", sans-serif;
  }

  .phone-shell {
    width: 390px; height: 844px;
    border-radius: 56px; border: 4px solid #1a1a1a;
    background: #0A0F0E; overflow: hidden;
    position: relative;
    box-shadow: 0 0 60px rgba(0,0,0,0.6), inset 0 0 0 2px #222;
  }
  .dynamic-island {
    position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
    width: 126px; height: 36px; background: #000; border-radius: 20px; z-index: 100;
  }
  .home-indicator {
    position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%);
    width: 134px; height: 5px; background: rgba(255,255,255,0.2); border-radius: 3px; z-index: 100;
  }

  .screen {
    width: 100%; height: 100%;
    position: relative; overflow: hidden;
    display: flex; flex-direction: column;
  }
  .bg-blobs { position: absolute; inset: 0; pointer-events: none; overflow: hidden; }
  .bg-blobs .blob { position: absolute; border-radius: 50%; }
  .bg-blobs .blob:nth-child(1) { width: 320px; height: 320px; background: rgba(52,211,153,0.055); top: -80px; left: -50px; }
  .bg-blobs .blob:nth-child(2) { width: 280px; height: 280px; background: rgba(240,160,80,0.04); top: 35%; right: -70px; }
  .bg-blobs .blob:nth-child(3) { width: 360px; height: 360px; background: rgba(52,211,153,0.035); bottom: -100px; left: 25%; }

  .header {
    padding: 60px 24px 0; text-align: center;
    position: relative; z-index: 20;
  }
  .header .book-title { font-size: 11px; font-weight: 500; letter-spacing: 0.1em; color: #546E64; }
  .header .dots { display: flex; align-items: center; justify-content: center; gap: 4px; margin-top: 8px; }
  .header .dot { width: 4px; height: 4px; border-radius: 50%; background: #2E4A40; }
  .header .dot.active { width: 20px; height: 4px; border-radius: 2px; background: linear-gradient(135deg, #34D399, #F0A050); }
  .header .dot.past { background: #546E64; }
  .header .count { font-size: 11px; color: #2E4A40; margin-top: 4px; }

  .card-area {
    flex: 1; position: relative; z-index: 10; overflow: hidden;
    display: flex; align-items: center; justify-content: center;
    padding: 24px 42px;
  }

  .card {
    width: 100%; height: 100%;
    border-radius: 20px;
    box-shadow: 0 6px 24px rgba(0,0,0,0.3), 0 0 40px rgba(52,211,153,0.06);
    border: 1px solid rgba(52,211,153,0.10);
    overflow: hidden;
    display: flex; flex-direction: column;
    position: relative;
    transition: opacity 0.3s ease;
  }
  .card .top-line {
    position: absolute; top: 0; left: 24px; right: 24px; height: 1px;
    background: linear-gradient(135deg, #34D399, #F0A050); opacity: 0.4;
  }
  .card-front { background: rgba(255,255,255,0.035); }
  .card-back { background: rgba(255,255,255,0.025); }

  .front-content {
    flex: 1; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    padding: 0 24px;
  }
  .sentence-text {
    font-size: 17px; line-height: 2.2; font-weight: 500;
    color: #E8F0EC; text-align: center;
    text-shadow: 0 0 28px rgba(52,211,153,0.15);
  }
  .front-footer {
    padding: 0 24px 16px;
    display: flex; flex-direction: column; align-items: center;
  }
  .author-line {
    display: flex; align-items: center; gap: 10px;
  }
  .author-dash { width: 16px; height: 1px; background: #2E4A40; }
  .author-name {
    font-size: 11px; letter-spacing: 0.08em; color: #546E64;
    cursor: pointer; transition: color 0.2s;
    border-bottom: 1px dashed rgba(84,110,100,0.5);
    padding-bottom: 1px;
  }
  .author-name:active { color: #9AADA2; }
  .flip-btn {
    display: inline-flex; align-items: center; gap: 4px;
    padding: 6px 14px; border-radius: 20px; margin-top: 8px;
    background: linear-gradient(135deg, #34D399, #F0A050);
    font-size: 11px; font-weight: 500; color: #fff;
    letter-spacing: 0.08em; cursor: pointer;
    transition: transform 0.15s;
  }
  .flip-btn:active { transform: scale(0.96); }

  .back-content {
    flex: 1; display: flex; flex-direction: column;
    justify-content: center; padding: 28px 22px 20px;
  }
  .tag-wrapper { text-align: center; margin-bottom: 16px; }
  .tag-label {
    display: inline-block; padding: 4px 14px; border-radius: 12px;
    background: linear-gradient(135deg, #34D399, #F0A050);
    font-size: 11px; font-weight: 600; letter-spacing: 0.12em; color: #fff;
  }
  .quote-card {
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(52,211,153,0.08);
    border-radius: 14px; padding: 14px 16px 12px;
    cursor: pointer; transition: border-color 0.2s, background 0.2s;
    position: relative;
  }
  .quote-card:active {
    background: rgba(255,255,255,0.06);
    border-color: rgba(52,211,153,0.18);
  }
  .quote-card .jump-hint {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    font-size: 14px; color: rgba(52,211,153,0.3); font-weight: 300;
  }
  .quote-text {
    font-size: 14px; line-height: 1.9; color: #E8F0EC;
    font-weight: 300; text-align: center;
    padding-right: 16px;
    border-bottom: 1px dashed rgba(52,211,153,0.2);
    padding-bottom: 4px;
  }
  .source-line {
    display: flex; align-items: center; justify-content: center;
    gap: 6px; margin-top: 10px;
  }
  .source-dot {
    width: 3px; height: 3px; border-radius: 50%;
    background: #34D399; opacity: 0.5; flex-shrink: 0;
  }
  .source-text {
    font-size: 11px; color: #546E64; letter-spacing: 0.03em;
    border-bottom: 1px dashed rgba(84,110,100,0.4);
    padding-bottom: 1px;
  }
  .divider {
    width: 50%; height: 1px; opacity: 0.15; margin: 20px auto;
    background: linear-gradient(90deg, transparent, #34D399, transparent);
  }
  .back-hint {
    font-size: 11px; letter-spacing: 0.1em; color: #2E4A40;
    text-align: center; margin-top: 20px; cursor: pointer;
  }

  .back-btn {
    position: absolute; top: 56px; left: 20px; z-index: 50;
    display: flex; align-items: center; gap: 4px;
    padding: 6px 12px; border-radius: 16px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(52,211,153,0.12);
    font-size: 11px; color: #9AADA2; letter-spacing: 0.05em;
    cursor: pointer; transition: opacity 0.25s, transform 0.15s;
  }
  .back-btn:active { transform: scale(0.95); }
  .back-btn .arrow { font-size: 13px; font-weight: 300; }
  .back-btn.hidden { opacity: 0; pointer-events: none; }

  .bottom-dots {
    display: flex; justify-content: center; align-items: center;
    gap: 8px; padding: 8px 24px; position: relative; z-index: 20;
  }
  .bottom-dots .bd { width: 4px; height: 4px; border-radius: 50%; background: #2E4A40; transition: all 0.3s; }
  .bottom-dots .bd.active { width: 20px; height: 4px; border-radius: 2px; background: linear-gradient(135deg, #34D399, #F0A050); }

  .tab-bar {
    display: flex; align-items: center; justify-content: space-around;
    padding: 8px 0 24px; position: relative; z-index: 20;
    border-top: 1px solid rgba(52,211,153,0.06);
  }
  .tab-bar .tab { display: flex; flex-direction: column; align-items: center; padding: 4px 0; }
  .tab-bar .tab .icon { font-size: 16px; }
  .tab-bar .tab .label { font-size: 11px; margin-top: 2px; }
  .tab-bar .tab.active .label { color: #34D399; font-weight: 500; }
  .tab-bar .tab:not(.active) .label { color: #546E64; }

  .overlay {
    position: absolute; inset: 0; z-index: 80;
    background: rgba(0,0,0,0.5);
    opacity: 0; pointer-events: none;
    transition: opacity 0.3s;
  }
  .overlay.visible { opacity: 1; pointer-events: auto; }

  .sheet {
    position: absolute; bottom: 0; left: 0; right: 0; z-index: 90;
    background: #131a18;
    border-top: 1px solid rgba(52,211,153,0.12);
    border-radius: 24px 24px 0 0;
    padding: 20px 24px 40px;
    transform: translateY(100%);
    transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  }
  .sheet.visible { transform: translateY(0); }
  .sheet-handle {
    width: 36px; height: 4px; border-radius: 2px;
    background: rgba(255,255,255,0.12); margin: 0 auto 16px;
  }
  .sheet-title {
    font-size: 14px; font-weight: 600; color: #E8F0EC;
    text-align: center; margin-bottom: 16px; letter-spacing: 0.05em;
  }
  .sheet-list { display: flex; flex-direction: column; gap: 8px; }
  .sheet-item {
    display: flex; align-items: center; justify-content: space-between;
    padding: 14px 16px; border-radius: 14px;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(52,211,153,0.08);
    cursor: pointer; transition: background 0.2s, border-color 0.2s;
  }
  .sheet-item:active {
    background: rgba(255,255,255,0.06);
    border-color: rgba(52,211,153,0.18);
  }
  .sheet-item-title { font-size: 14px; color: #E8F0EC; font-weight: 400; }
  .sheet-item-count { font-size: 11px; color: #546E64; }
  .sheet-item-arrow { font-size: 14px; color: rgba(52,211,153,0.3); font-weight: 300; }

  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  .fade-in { animation: fadeIn 0.35s ease; }

  @media (max-width: 430px) {
    .phone-shell { width: 100vw; height: 100vh; border-radius: 0; border: none; box-shadow: none; }
    .dynamic-island, .home-indicator { display: none; }
  }
</style>
</head>
<body>

<div class="phone-shell">
  <div class="dynamic-island"></div>
  <div class="home-indicator"></div>

  <div class="screen" id="screen">
    <div class="bg-blobs">
      <div class="blob"></div>
      <div class="blob"></div>
      <div class="blob"></div>
    </div>

    <div id="backBtn" class="back-btn hidden" onclick="goBack()">
      <span class="arrow">‹</span> 返回上一张
    </div>

    <div class="header">
      <div class="book-title" id="headerTitle">人 类 简 史</div>
      <div class="dots" id="headerDots"></div>
      <div class="count" id="headerCount">1 / 8</div>
    </div>

    <div class="card-area" id="cardArea"></div>

    <div class="bottom-dots" id="bottomDots"></div>

    <div class="tab-bar">
      <div class="tab active">
        <span class="icon">📖</span>
        <span class="label">阅读</span>
      </div>
      <div class="tab">
        <span class="icon">⭐</span>
        <span class="label">我的</span>
      </div>
    </div>

    <div class="overlay" id="overlay" onclick="closeSheet()"></div>
    <div class="sheet" id="sheet">
      <div class="sheet-handle"></div>
      <div class="sheet-title" id="sheetTitle"></div>
      <div class="sheet-list" id="sheetList"></div>
    </div>
  </div>
</div>

<script>
const BOOKS = [
  {
    title: '人类简史', author: '尤瓦尔·赫拉利',
    sentences: [
      {
        text: '想象的现实不是谎言。如果整个社会都相信同样的故事，只要这个信念还在，它的力量就足以影响世界。',
        chapter: '第一部分 认知革命',
        similar: { text: '一个民族的神话，比它的历史更能揭示它的本质。', book_title: '千面英雄', book_author: '约瑟夫·坎贝尔', target: [3, 0] },
        opposite: { text: '凡可被经验证伪的，才是科学的。不可证伪的信念体系不过是伪科学。', book_title: '猜想与反驳', book_author: '卡尔·波普尔', target: null },
      },
      {
        text: '农业革命是史上最大的骗局。',
        chapter: '第二部分 农业革命',
        similar: { text: '我们驯化了小麦，但小麦也驯化了我们。', book_title: '枪炮、病菌与钢铁', book_author: '贾雷德·戴蒙德', target: [2, 0] },
        opposite: { text: '农业是文明的基础，没有农业就没有城市、文字和一切伟大成就。', book_title: '文明的故事', book_author: '威尔·杜兰特', target: null },
      },
    ],
  },
  {
    title: '未来简史', author: '尤瓦尔·赫拉利',
    sentences: [
      {
        text: '人类之所以能统治世界，是因为我们是唯一能编织并相信虚构故事的动物。',
        chapter: '第一章',
        similar: { text: '英雄的旅程总是遵循同一个模式：离开—历险—回归。', book_title: '千面英雄', book_author: '约瑟夫·坎贝尔', target: [3, 0] },
        opposite: { text: '不同民族之间发展的差异，不是因为人种的生物学差异，而是因为环境的差异。', book_title: '枪炮、病菌与钢铁', book_author: '贾雷德·戴蒙德', target: [2, 0] },
      },
      {
        text: '在 21 世纪，人类可能的三大议题：长生不死、幸福快乐、化身为神。',
        chapter: '第一章',
        similar: null, opposite: null,
      },
    ],
  },
  {
    title: '枪炮、病菌与钢铁', author: '贾雷德·戴蒙德',
    sentences: [
      {
        text: '不同民族之间发展的差异，不是因为人种的生物学差异，而是因为环境的差异。',
        chapter: '序章',
        similar: { text: '地理决定了文明的基本轮廓。', book_title: '千面英雄', book_author: '约瑟夫·坎贝尔', target: [3, 0] },
        opposite: { text: '文化才是推动历史的核心力量，而非地理。', book_title: '历史的教训', book_author: '威尔·杜兰特', target: null },
      },
      {
        text: '粮食生产是枪炮、病菌与钢铁的终极原因。',
        chapter: '第四章',
        similar: null, opposite: null,
      },
    ],
  },
  {
    title: '千面英雄', author: '约瑟夫·坎贝尔',
    sentences: [
      {
        text: '英雄的旅程总是遵循同一个模式：离开—历险—回归。',
        chapter: '第一章 启程',
        similar: { text: '所有伟大的故事都是同一个故事的变奏。', book_title: '故事', book_author: '罗伯特·麦基', target: null },
        opposite: { text: '历史的铁则就是：事后看来无可避免的事，在当时看来总是毫不明显。', book_title: '人类简史', book_author: '尤瓦尔·赫拉利', target: [0, 0] },
      },
    ],
  },
]

let currentBook = 0
let currentSentence = 0
let isFlipped = false
let history = []

function render() {
  const book = BOOKS[currentBook]
  const s = book.sentences[currentSentence]

  document.getElementById('headerTitle').textContent = book.title.split('').join(' ')
  const dotsHtml = book.sentences.map((_, i) =>
    `<div class="dot ${i === currentSentence ? 'active' : i < currentSentence ? 'past' : ''}"></div>`
  ).join('')
  document.getElementById('headerDots').innerHTML = dotsHtml
  document.getElementById('headerCount').textContent = `${currentSentence + 1} / ${book.sentences.length}`

  const bottomHtml = BOOKS.map((_, i) =>
    `<div class="bd ${i === currentBook ? 'active' : ''}"></div>`
  ).join('')
  document.getElementById('bottomDots').innerHTML = bottomHtml

  document.getElementById('backBtn').className = history.length > 0 ? 'back-btn fade-in' : 'back-btn hidden'

  if (!isFlipped) {
    renderFront(book, s)
  } else {
    renderBack(s)
  }
}

function renderFront(book, s) {
  document.getElementById('cardArea').innerHTML = `
    <div class="card card-front fade-in">
      <div class="top-line"></div>
      <div class="front-content" onclick="toggleContext()">
        <div class="sentence-text">${s.text}</div>
      </div>
      <div class="front-footer">
        <div class="author-line">
          <div class="author-dash"></div>
          <span class="author-name" onclick="event.stopPropagation(); onTapAuthor('${book.author}')">${book.author}</span>
          <div class="author-dash"></div>
        </div>
        <div class="flip-btn" onclick="flip()">翻一面</div>
      </div>
    </div>
  `
}

function renderBack(s) {
  const hasBoth = s.similar && s.opposite
  const similarClickable = s.similar && s.similar.target
  const oppositeClickable = s.opposite && s.opposite.target

  let html = `<div class="card card-back fade-in"><div class="top-line"></div><div class="back-content">`

  if (hasBoth) {
    html += `
      <div class="tag-wrapper"><span class="tag-label">英雄所见略同</span></div>
      <div class="quote-card ${similarClickable ? '' : ''}" onclick="${similarClickable ? `jumpTo(${s.similar.target[0]}, ${s.similar.target[1]})` : ''}">
        ${similarClickable ? '<span class="jump-hint">›</span>' : ''}
        <div class="quote-text">${s.similar.text}</div>
        <div class="source-line">
          <span class="source-dot"></span>
          <span class="source-text">《${s.similar.book_title}》${s.similar.book_author}</span>
        </div>
      </div>
      <div class="divider"></div>
      <div class="tag-wrapper"><span class="tag-label">但也有人说...</span></div>
      <div class="quote-card ${oppositeClickable ? '' : ''}" onclick="${oppositeClickable ? `jumpTo(${s.opposite.target[0]}, ${s.opposite.target[1]})` : ''}">
        ${oppositeClickable ? '<span class="jump-hint">›</span>' : ''}
        <div class="quote-text">${s.opposite.text}</div>
        <div class="source-line">
          <span class="source-dot"></span>
          <span class="source-text">《${s.opposite.book_title}》${s.opposite.book_author}</span>
        </div>
      </div>
    `
  }

  html += `<div class="back-hint" onclick="flip()">←</div></div></div>`
  document.getElementById('cardArea').innerHTML = html
}

function flip() {
  isFlipped = !isFlipped
  render()
}

function toggleContext() {}

function jumpTo(bookIdx, sentenceIdx) {
  history.push({ book: currentBook, sentence: currentSentence, flipped: isFlipped })
  currentBook = bookIdx
  currentSentence = sentenceIdx
  isFlipped = false
  render()
}

function goBack() {
  if (history.length === 0) return
  const prev = history.pop()
  currentBook = prev.book
  currentSentence = prev.sentence
  isFlipped = prev.flipped
  render()
}

function onTapAuthor(author) {
  const authorBooks = BOOKS
    .map((b, i) => ({ title: b.title, index: i, count: b.sentences.length }))
    .filter(b => BOOKS[b.index].author === author)

  const otherBooks = authorBooks.filter(b => b.index !== currentBook)
  if (otherBooks.length === 0) return

  document.getElementById('sheetTitle').textContent = author
  document.getElementById('sheetList').innerHTML = otherBooks.map(b => `
    <div class="sheet-item" onclick="closeSheet(); jumpTo(${b.index}, 0)">
      <div>
        <div class="sheet-item-title">《${b.title}》</div>
        <div class="sheet-item-count">${b.count} 句</div>
      </div>
      <span class="sheet-item-arrow">›</span>
    </div>
  `).join('')

  document.getElementById('overlay').classList.add('visible')
  document.getElementById('sheet').classList.add('visible')
}

function closeSheet() {
  document.getElementById('overlay').classList.remove('visible')
  document.getElementById('sheet').classList.remove('visible')
}

render()
</script>

</body>
</html>
