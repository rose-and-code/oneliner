repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
        args: [--unsafe]
      - id: check-json
      - id: check-merge-conflict
      - id: check-case-conflict
      - id: check-added-large-files
        args: [--maxkb=1000]
      - id: mixed-line-ending
        args: [--fix=lf]

  - repo: local
    hooks:
      - id: black-backend
        name: Black (Backend)
        entry: bash -c 'cd backend && uv run black --check .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        stages: [pre-commit]

      - id: ruff-backend
        name: Ruff (Backend)
        entry: bash -c 'cd backend && uv run ruff check .'
        language: system
        files: ^backend/.*\.py$
        pass_filenames: false
        stages: [pre-commit]
