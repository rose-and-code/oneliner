name: Deploy Miniprogram to Development

on:
  push:
    branches: [main]
    paths:
      - 'miniprogram/**'
  workflow_dispatch:
    inputs:
      desc:
        description: '版本描述'
        required: false
        default: '功能更新'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: miniprogram/package-lock.json

      - name: Install dependencies
        working-directory: miniprogram
        run: npm ci

      - name: Build miniprogram
        working-directory: miniprogram
        run: npm run build

      - name: Install miniprogram-ci
        run: npm install -g miniprogram-ci

      - name: Setup private key
        env:
          WECHAT_PRIVATE_KEY: ${{ secrets.WECHAT_PRIVATE_KEY }}
        run: printenv WECHAT_PRIVATE_KEY > private.key

      - name: Upload to WeChat Development
        run: |
          miniprogram-ci upload \
            --pp ./miniprogram/dist \
            --pkp ./private.key \
            --appid ${{ secrets.WECHAT_APPID }} \
            --uv "pre-release" \
            -r 1 \
            --enable-es6 true \
            --enable-es7 true \
            --enable-minify true \
            --desc "${{ github.event.inputs.desc || '功能更新' }}"

      - name: Cleanup
        if: always()
        run: rm -f private.key

      - name: Deployment summary
        run: |
          echo "## 🚀 小程序开发版上传成功" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "- **版本号**: pre-release" >> $GITHUB_STEP_SUMMARY
          echo "- **描述**: ${{ github.event.inputs.desc || '功能更新' }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📱 请在微信开发者工具或小程序后台查看开发版" >> $GITHUB_STEP_SUMMARY
