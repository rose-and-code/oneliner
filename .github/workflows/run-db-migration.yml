name: 运行数据库迁移

on:
  workflow_dispatch:
    inputs:
      environment:
        description: '环境'
        required: true
        default: 'release'
        type: choice
        options:
          - release

jobs:
  migrate:
    name: 执行数据库迁移
    runs-on: ubuntu-latest

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装 uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: 安装依赖
        working-directory: ./backend
        run: uv sync

      - name: 运行数据库迁移
        working-directory: ./backend
        env:
          ENV: ${{ inputs.environment }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          uv run aerich fix-migrations || true
          uv run aerich upgrade
